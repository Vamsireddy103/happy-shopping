<!DOCTYPE html>
<html>
<head>
  <title>Happy Shopping</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f4f6;
      text-align: center;
    }

    .header {
      background: #111827;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
    }

    input {
      width: 95%;
      padding: 12px;
      margin-top: 10px;
    }

    button {
      width: 98%;
      padding: 12px;
      margin-top: 10px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    img {
      width: 120px;
      margin-top: 20px;
    }

    .title {
      font-weight: bold;
      margin-top: 10px;
    }

    .buy-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: green;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="header">🛍️ Happy Shopping</div>

<div class="container">

  <h2>Get the Best Deal Instantly</h2>

  <input id="urlInput" placeholder="Paste Amazon link here">
  <button onclick="generate()">Get Best Deal</button>

  <div id="output"></div>

</div>

<script>

// ✅ ALL YOUR IDS
const ids = [
  "reddy0be-21",
  "vam001-21",
  "vam12305-21",
  "vamsi0107-21",
  "vamsi0365-21",
  "vamsi0d9-21",
  "vamsi19970e-21"
];

// ✅ ROTATING LOGIC
function getAffiliate(){

  let counter = localStorage.getItem("aff_counter");

  if (!counter) {
    counter = 0;
  } else {
    counter = parseInt(counter);
  }

  let id = ids[counter % ids.length];

  counter++;

  localStorage.setItem("aff_counter", counter);

  return id;
}

// ✅ ASIN
function getASIN(url){
  let m = url.match(/\/dp\/(\w+)/);
  return m ? m[1] : null;
}

// ✅ TITLE
function getTitle(url){
  try{
    return new URL(url).pathname.split("/")[1].replace(/-/g," ");
  } catch {
    return "Product";
  }
}

// ✅ MAIN
function generate(){

  let url = document.getElementById("urlInput").value;
  let asin = getASIN(url);

  if(!asin){
    alert("Invalid link");
    return;
  }

  let tag = getAffiliate();

  let link = "https://www.amazon.in/dp/" + asin + "?tag=" + tag;
  let img = "https://images-na.ssl-images-amazon.com/images/P/" + asin + ".01._SX300_.jpg";
  let title = getTitle(url);

  let container = document.getElementById("output");
  container.innerHTML = "";

  let image = document.createElement("img");
  image.src = img;

  let titleEl = document.createElement("div");
  titleEl.className = "title";
  titleEl.innerText = title;

  let button = document.createElement("a");
  button.href = link;
  button.target = "_blank";
  button.className = "buy-btn";
  button.innerText = "✅ View Deal on Amazon";

  container.appendChild(image);
  container.appendChild(titleEl);
  container.appendChild(button);
}

</script>

</body>
</html>
