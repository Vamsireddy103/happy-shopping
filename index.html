<!DOCTYPE html>
<html>
<head>
  <title>Happy Shopping</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f4f6;
      text-align: center;
    }

    .header {
      background: #111827;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    input {
      width: 95%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 98%;
      padding: 12px;
      margin-top: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }

    img {
      width: 120px;
      margin-top: 20px;
    }

    .title {
      font-weight: bold;
      margin-top: 10px;
      font-size: 14px;
    }

    .buy-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #16a34a;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .buy-btn:hover {
      background: #15803d;
    }

  </style>

</head>

<body>

<div class="header">🛍️ Happy Shopping</div>

<div class="container">

  <h2>Get the Best Deal Instantly</h2>

  <input id="urlInput" placeholder="Paste Amazon link here">
  <button onclick="generate()">Get Best Deal</button>

  <div id="output"></div>

</div>

<script>

// ✅ YOUR CORRECT IDS
const ids = [
  "reddy0be-21",
  "vam001-21",
  "vam12305-21",
  "vamsi0107-21",
  "vamsi0365-21",
  "vamsi0d9-21",
  "vamsi19970e-21"
];

// ✅ ROTATION SYSTEM (VERY IMPORTANT)
function getAffiliate() {

  let counter = localStorage.getItem("aff_counter");

  if (!counter) {
    counter = 0;
  } else {
    counter = parseInt(counter);
  }

  let id = ids[counter % ids.length];

  counter++;

  localStorage.setItem("aff_counter", counter);

  return id;
}

// ✅ EXTRACT ASIN
function getASIN(url){
  let match = url.match(/\/dp\/(\w+)/) || url.match(/product\/(\w+)/);
  return match ? match[1] : null;
}

// ✅ EXTRACT TITLE
function getTitle(url){
  try{
    return new URL(url).pathname.split("/")[1].replace(/-/g," ");
  } catch {
    return "Product";
  }
}

// ✅ MAIN FUNCTION
function generate(){

  let url = document.getElementById("urlInput").value.trim();
  let asin = getASIN(url);

  if(!asin){
    alert("Please enter a valid Amazon product link");
    return;
  }

  let tag = getAffiliate();

  let finalLink = "https://www.amazon.in/dp/" + asin + "?tag=" + tag;

  let img = "https://images-na.ssl-images-amazon.com/images/P/" + asin + ".01._SX300_.jpg";

  let title = getTitle(url);

  let container = document.getElementById("output");

  // ✅ CLEAR OLD CONTENT
  container.innerHTML = "";

  // ✅ IMAGE
  let image = document.createElement("img");
  image.src = img;

  // ✅ TITLE
  let titleEl = document.createElement("div");
  titleEl.className = "title";
  titleEl.innerText = title;

  // ✅ BUTTON
  let button = document.createElement("a");
  button.href = finalLink;
  button.target = "_blank";
  button.className = "buy-btn";
  button.innerText = "✅ View Deal on Amazon";

  // ✅ ADD TO PAGE
  container.appendChild(image);
  container.appendChild(titleEl);
  container.appendChild(button);
}

</script>

</body>
</html>
